name: ytv-downloader

services:
  downloader:
    build: .
    container_name: ytv-downloader
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Default downloads directory (maps to your Host's Downloads folder)
      - ~/Downloads:/app/downloads
      # Map host home directory so you can dynamically save to any folder inside your user profile
      - ~:/app/host-home
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST_HOME=${HOME:-${USERPROFILE}}
